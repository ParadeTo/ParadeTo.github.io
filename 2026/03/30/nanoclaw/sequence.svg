<svg width="820" height="520" viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="820" height="520" fill="#FAFAFA"/>

  <!-- ══ Participant Boxes ══ -->
  <!-- x centers: 70, 210, 350, 490, 650 -->

  <rect x="10"  y="18" width="120" height="38" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="70"  y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">用户（飞书）</text>

  <rect x="150" y="18" width="120" height="38" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="210" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">飞书 Channel</text>

  <rect x="290" y="18" width="120" height="38" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="350" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">SQLite</text>

  <rect x="425" y="18" width="130" height="38" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="490" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">消息循环 /</text>
  <text x="490" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">GroupQueue</text>

  <rect x="590" y="18" width="120" height="38" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="650" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#4C1D95">容器（Agent）</text>

  <!-- ══ Lifelines ══ -->
  <line x1="70"  y1="56" x2="70"  y2="490" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="210" y1="56" x2="210" y2="490" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="350" y1="56" x2="350" y2="490" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="490" y1="56" x2="490" y2="490" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="650" y1="56" x2="650" y2="490" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ══ Activation box: 容器处理中 ══ -->
  <rect x="642" y="268" width="16" height="128" rx="2" fill="#C4B5FD" stroke="#7C3AED" stroke-width="1"/>

  <!-- ══ Message 1: 用户 → 飞书Channel (y=100) ══ -->
  <text x="140" y="93"  text-anchor="middle" font-size="10.5" fill="#334155">@Andy 查北京天气</text>
  <line x1="70" y1="100" x2="206" y2="100" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Message 2: 飞书Channel → SQLite (y=138) ══ -->
  <text x="280" y="131" text-anchor="middle" font-size="10.5" fill="#334155">storeMessage()</text>
  <line x1="210" y1="138" x2="346" y2="138" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Message 3: 消息循环 → SQLite 轮询（左向，每2秒）══ -->
  <text x="420" y="169" text-anchor="middle" font-size="10.5" fill="#334155">getNewMessages()</text>
  <rect x="458" y="172" width="46" height="15" rx="3" fill="#FEF3C7"/>
  <text x="481" y="183" text-anchor="middle" font-size="9" fill="#92400E">每 2 秒</text>
  <line x1="490" y1="178" x2="354" y2="178" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ══ Message 4: GroupQueue → 容器（docker run）══ -->
  <text x="570" y="218" text-anchor="middle" font-size="10.5" fill="#334155">docker run（触发词命中）</text>
  <line x1="490" y1="226" x2="642" y2="226" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Agent processing label ══ -->
  <rect x="668" y="284" width="100" height="52" rx="6" fill="#F3F0FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="718" y="306" text-anchor="middle" font-size="10" fill="#4C1D95">调用工具</text>
  <text x="718" y="323" text-anchor="middle" font-size="10" fill="#4C1D95">查天气...</text>

  <!-- ══ Message 5: 容器 → 飞书Channel（IPC，左向）══ -->
  <text x="430" y="383" text-anchor="middle" font-size="10.5" fill="#334155">IPC sendMessage()</text>
  <text x="430" y="397" text-anchor="middle" font-size="9.5" fill="#64748B">（stdout 边界标记触发）</text>
  <line x1="642" y1="405" x2="214" y2="405" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Message 6: 飞书Channel → 用户（左向）══ -->
  <text x="140" y="433" text-anchor="middle" font-size="10.5" fill="#334155">北京晴，8–18°C</text>
  <line x1="210" y1="441" x2="74"  y2="441" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Container idle note ══ -->
  <rect x="668" y="416" width="105" height="36" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="720" y="432" text-anchor="middle" font-size="10" fill="#9A3412">idle 等待</text>
  <text x="720" y="447" text-anchor="middle" font-size="9"  fill="#C2410C">30分钟后销毁</text>

  <!-- ══ Step Labels ══ -->
  <circle cx="26" cy="100" r="10" fill="#3B82F6"/>
  <text   x="26" y="104"  text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
  <circle cx="26" cy="138" r="10" fill="#3B82F6"/>
  <text   x="26" y="142"  text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
  <circle cx="26" cy="178" r="10" fill="#10B981"/>
  <text   x="26" y="182"  text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
  <circle cx="26" cy="226" r="10" fill="#10B981"/>
  <text   x="26" y="230"  text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
  <circle cx="26" cy="405" r="10" fill="#8B5CF6"/>
  <text   x="26" y="409"  text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
  <circle cx="26" cy="441" r="10" fill="#3B82F6"/>
  <text   x="26" y="445"  text-anchor="middle" font-size="10" font-weight="700" fill="#fff">6</text>
</svg>
